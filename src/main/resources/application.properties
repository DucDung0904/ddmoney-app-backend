spring.application.name=ddmoney

# ─── MySQL (Laragon) ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ddmoney?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ─── Tắt data.sql (dùng DataInitializer thay thế) ────────────────────
spring.sql.init.mode=never

# ─── Server ───────────────────────────────────────────────────────────
server.port=8080

# ─── Logging (debug validation errors) ───────────────────────────────
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.validation=DEBUG
